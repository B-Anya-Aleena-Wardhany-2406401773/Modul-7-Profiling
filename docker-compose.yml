services:
  db:
    image: postgres:latest
    ports:
      - '15002:5432'
    restart: 'no'
    environment:
      - POSTGRES_USER=anya.aleena
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=modul-7-profiling
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - db_advprog:/var/lib/postgresql/data

volumes:
  db_advprog:
    driver: local